<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファイトラック - トラック休憩スポット検索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0A1628;--blue:#1565C0;--blue-v:#1E88E5;--cyan:#00ACC1;
  --accent:#FF6F00;--accent-l:#FFF3E0;
  --white:#fff;--gray:#F4F6F9;--text:#1A2332;--text2:#6B7A8D;
  --border:#E0E8F5;--shadow:0 4px 24px rgba(10,22,40,.1);
  --r:12px;
}
html,body{width:100%;min-height:100vh;background:var(--gray);font-family:'Noto Sans JP',sans-serif;color:var(--text)}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:320px 1fr 360px;grid-template-rows:62px 1fr;height:100vh}
@media(max-width:1200px){.wrap{grid-template-columns:280px 1fr}.right{display:none!important}}
@media(max-width:740px){.wrap{grid-template-columns:1fr;grid-template-rows:56px 1fr}.left{display:none!important}.mob-search{display:flex!important}}

/* HEADER */
header{grid-column:1/-1;background:var(--navy);display:flex;align-items:center;padding:0 1.4rem;gap:1rem;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:500}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;text-decoration:none}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#1565C0,#00ACC1);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:21px;height:21px}
.logo-ja{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;display:block;line-height:1}
.logo-en{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:2px;display:block;margin-top:2px}
.h-search{flex:1;max-width:520px;position:relative}
.h-search input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:.55rem 1rem .55rem 2.6rem;font-size:13px;color:#fff;outline:none;font-family:inherit;transition:all .2s}
.h-search input::placeholder{color:rgba(255,255,255,.3)}
.h-search input:focus{background:rgba(255,255,255,.12);border-color:var(--blue-v)}
.h-search .si{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);opacity:.4;font-size:14px}
.h-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.btn-o{background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.18);border-radius:7px;padding:.4rem 1rem;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-o:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-p{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:.4rem 1rem;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-p:hover{background:var(--blue-v)}
.beta{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px;flex-shrink:0}

/* LEFT */
.left{background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.left-head{padding:.9rem 1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0}
.filter-title{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:.6rem}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.spot-list{overflow-y:auto;padding:.7rem;display:flex;flex-direction:column;gap:.5rem;flex:1}
.spot-list::-webkit-scrollbar{width:4px}
.spot-list::-webkit-scrollbar-track{background:transparent}
.spot-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:.85rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .18s}
.sc:hover{border-color:#90CAF9;box-shadow:0 2px 12px rgba(21,101,192,.08)}
.sc:hover::before,.sc.sel::before{background:var(--blue)}
.sc.sel{border-color:var(--blue)}
.sc-top{display:flex;gap:9px;margin-bottom:.6rem;align-items:flex-start}
.sc-ico{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sc-body{flex:1;min-width:0}
.sc-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.sc-addr{font-size:10px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-dist{font-size:11px;font-weight:700;color:var(--blue);white-space:nowrap;margin-top:1px}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:.5rem}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.t-ok{background:#E8F5E9;color:#2E7D32}
.t-info{background:#E3F0FF;color:#1565C0}
.t-warn{background:#FFF3E0;color:#E65100}
.t-ng{background:#FFEBEE;color:#C62828}
.sc-foot{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text2)}
.stars{color:#F9A825;font-size:10px}

/* MAP */
.map-area{position:relative;background:#E8EDF5}
#map{width:100%;height:100%}
.map-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,22,40,.82);color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);white-space:nowrap;pointer-events:none;z-index:10}
.map-badge span{color:#FF9800}
.fab{position:absolute;bottom:20px;right:14px;width:46px;height:46px;background:var(--blue);border-radius:50%;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(21,101,192,.4);display:flex;align-items:center;justify-content:center;font-size:18px;z-index:10;transition:transform .2s}
.fab:hover{transform:scale(1.1)}
.mob-search{display:none;padding:.7rem;background:#fff;border-bottom:1px solid var(--border)}
.mob-search input{width:100%;border:1px solid var(--border);border-radius:9px;padding:.6rem 1rem;font-size:13px;outline:none;font-family:inherit}

/* RIGHT */
.right{background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.r-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text2);padding:2rem;gap:.8rem}
.r-empty-icon{font-size:44px;opacity:.35}
.r-empty p{font-size:13px;line-height:1.7}
.r-detail{display:none;flex-direction:column;flex:1;overflow:hidden}
.r-detail.on{display:flex}
.r-scroll{flex:1;overflow-y:auto}
.r-scroll::-webkit-scrollbar{width:4px}
.r-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.d-hero{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0}
.d-hero-icon{font-size:66px;opacity:.2;position:relative;z-index:1}
.d-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;z-index:2}
.d-body{padding:1.1rem}
.d-chip{font-size:10px;background:var(--gray);padding:3px 9px;border-radius:6px;font-weight:700;display:inline-block;margin-bottom:.5rem}
.d-name{font-size:18px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:.3rem}
.d-addr{font-size:11px;color:var(--text2);margin-bottom:.4rem;line-height:1.5}
.d-tel{font-size:11px;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:4px}
.i-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem}
.i-card{background:var(--gray);border-radius:9px;padding:.65rem .8rem}
.i-lbl{font-size:9px;color:var(--text2);font-weight:700;letter-spacing:.5px;margin-bottom:3px}
.i-val{font-size:12px;font-weight:700;color:var(--text)}
.f-title{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.5px;margin-bottom:.6rem}
.f-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem}
.fac{font-size:11px;color:var(--text);background:var(--gray);padding:4px 9px;border-radius:7px}
.src-box{background:#F0F6FF;border:1px solid #BBDEFB;border-radius:8px;padding:.6rem .8rem;font-size:10px;color:#1565C0;line-height:1.6;margin-bottom:1rem}
.notice{background:var(--accent-l);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:.6rem .8rem;font-size:11px;color:#7A4000;margin-bottom:1rem;line-height:1.6}
.r-actions{padding:.9rem 1.1rem;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:.5rem}
.btn-main{width:100%;background:var(--blue);color:#fff;border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-main:hover{background:var(--blue-v)}
.btn-sub{width:100%;background:#fff;color:var(--blue);border:1.5px solid var(--blue);border-radius:9px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.6);z-index:600;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.4rem;width:100%;max-width:480px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.1rem}
.modal-title{font-size:15px;font-weight:700;margin-bottom:.9rem}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.opt{border:1.5px solid var(--border);border-radius:11px;padding:.85rem;text-align:center;cursor:pointer;transition:all .15s}
.opt.on{border-color:var(--blue);background:#E3F0FF}
.opt-icon{font-size:22px;display:block;margin-bottom:.4rem}
.opt-label{font-size:12px;font-weight:700;color:var(--text)}
.opt-sub{font-size:10px;color:var(--text2);margin-top:2px}
.ci-done{background:#E8F5E9;border-radius:14px;padding:1.4rem;text-align:center;display:none}
.ci-done-icon{font-size:44px;display:block;margin-bottom:.7rem}
.ci-done-title{font-size:16px;font-weight:700;color:#2E7D32;margin-bottom:.4rem}
.ci-done-text{font-size:12px;color:var(--text2);line-height:1.7}

/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:200}
@media(max-width:740px){.mob-nav{display:flex}}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:.55rem;font-size:9px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:inherit;letter-spacing:.3px}
.mn-item.on{color:var(--blue)}
.mn-item span:first-child{font-size:19px}
</style>
</head>
<body>
<div class="wrap">

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 22 22" fill="none">
        <rect x="1" y="6" width="20" height="12" rx="3" stroke="white" stroke-width="1.8"/>
        <rect x="1" y="6" width="9" height="8" rx="2" fill="white" opacity="0.3"/>
        <circle cx="6" cy="18" r="2.8" fill="white"/>
        <circle cx="17" cy="18" r="2.8" fill="white"/>
      </svg>
    </div>
    <div>
      <span class="logo-ja">ファイトラック</span>
      <span class="logo-en">TRUCK REST FINDER</span>
    </div>
  </a>
  <div class="h-search">
    <span class="si">🔍</span>
    <input type="text" placeholder="施設名・エリア・設備で検索...">
  </div>
  <div class="h-right">
    <span class="beta">β版</span>
    <button class="btn-o">ログイン</button>
    <button class="btn-p">無料登録</button>
  </div>
</header>

<!-- MOBILE SEARCH -->
<div class="mob-search">
  <input type="text" placeholder="施設名・エリアで検索...">
</div>

<!-- LEFT -->
<div class="left">
  <div class="left-head">
    <div class="filter-title">絞り込み</div>
    <div class="chips">
      <button class="chip on" onclick="this.classList.toggle('on')">大型駐車可</button>
      <button class="chip on" onclick="this.classList.toggle('on')">シャワー</button>
      <button class="chip" onclick="this.classList.toggle('on')">仮眠室</button>
      <button class="chip" onclick="this.classList.toggle('on')">食堂</button>
      <button class="chip" onclick="this.classList.toggle('on')">Wi-Fi</button>
      <button class="chip" onclick="this.classList.toggle('on')">24時間</button>
      <button class="chip" onclick="this.classList.toggle('on')">コンビニ</button>
    </div>
  </div>
  <div class="spot-list" id="spot-list"></div>
</div>

<!-- MAP -->
<div class="map-area">
  <div id="map"></div>
  <div class="map-badge">🚧 β版 · <span>公式データ掲載中（東海エリア）</span></div>
  <button class="fab" onclick="locateMe()">📍</button>
</div>

<!-- RIGHT -->
<div class="right" id="right">
  <div class="r-empty" id="r-empty">
    <div class="r-empty-icon">🗺️</div>
    <p>地図のピンまたは<br>左のリストから<br>スポットを選んでください</p>
  </div>
  <div class="r-detail" id="r-detail">
    <div class="r-scroll">
      <div class="d-hero" id="d-hero">
        <div style="position:absolute;inset:0" id="d-hero-bg"></div>
        <div class="d-hero-icon" id="d-icon">🏢</div>
        <span class="d-badge t-ok" id="d-badge">✅ 実データ</span>
      </div>
      <div class="d-body">
        <div class="d-chip" id="d-cat">道の駅</div>
        <div class="d-name" id="d-name">-</div>
        <div class="d-addr" id="d-addr">-</div>
        <div class="d-tel" id="d-tel">📞 -</div>
        <div class="i-grid">
          <div class="i-card"><div class="i-lbl">大型駐車</div><div class="i-val" id="d-slots">-</div></div>
          <div class="i-card"><div class="i-lbl">営業時間</div><div class="i-val" id="d-hours">-</div></div>
          <div class="i-card"><div class="i-lbl">シャワー</div><div class="i-val" id="d-shower">-</div></div>
          <div class="i-card"><div class="i-lbl">仮眠・宿泊</div><div class="i-val" id="d-sleep">-</div></div>
        </div>
        <div class="f-title">設備・サービス</div>
        <div class="f-grid" id="d-facs"></div>
        <div class="src-box" id="d-src">出典：-</div>
        <div class="notice">⚠️ β版のため情報が古い場合があります。利用前に必ず各施設へご確認ください。</div>
      </div>
    </div>
    <div class="r-actions">
      <button class="btn-main" id="d-gmap-btn">🗺️ Google マップで開く</button>
      <button class="btn-sub" onclick="showCI()">✅ チェックイン</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->

<!-- MOBILE NAV -->
<nav class="mob-nav">
  <button class="mn-item on"><span>🔍</span>検索</button>
  <button class="mn-item"><span>🗺️</span>地図</button>
  <button class="mn-item"><span>📍</span>チェックイン</button>
  <button class="mn-item"><span>👤</span>マイページ</button>
</nav>

<!-- CHECKIN MODAL -->
<div class="overlay" id="ci-overlay" onclick="closeCI(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="ci-title">チェックイン</div>
    <div id="ci-form">
      <div class="opt-grid">
        <div class="opt on" onclick="selOpt(this)"><span class="opt-icon">🅿️</span><div class="opt-label">駐車のみ</div><div class="opt-sub">無料</div></div>
        <div class="opt" onclick="selOpt(this)"><span class="opt-icon">🚿</span><div class="opt-label">シャワー</div><div class="opt-sub" id="ci-shower-price">-</div></div>
        <div class="opt" onclick="selOpt(this)"><span class="opt-icon">🛏️</span><div class="opt-label">仮眠室</div><div class="opt-sub" id="ci-sleep-price">-</div></div>
        <div class="opt" onclick="selOpt(this)"><span class="opt-icon">🍽️</span><div class="opt-label">食事</div><div class="opt-sub">食堂あり</div></div>
      </div>
      <button class="btn-main" onclick="doCI()">✅ チェックインする</button>
    </div>
    <div class="ci-done" id="ci-done">
      <span class="ci-done-icon">✅</span>
      <div class="ci-done-title">チェックイン完了！</div>
      <div class="ci-done-text">ゆっくり休んでください 🙏<br>帰りに口コミを投稿して仲間に教えてあげましょう！</div>
      <button class="btn-main" style="margin-top:1rem" onclick="closeCI()">閉じる</button>
    </div>
  </div>
</div>

    facs:['🚿シャワー','🍽️食事・軽食','🅿️大型駐車可（3台）'],
    src:'出典：NAVITIME・全国道の駅連絡会', real:true,
    gmapq:'道の駅 和良 岐阜県郡上市和良町宮地1155'
  },
  {
    id:5, name:'亀山トラックステーション', cat:'トラックST', icon:'🚛', color:'#6A1B9A',
    addr:'三重県亀山市小野町桜ロ586-4', tel:'0595-82-3935',
    lat:34.8565, lng:136.4522,
    slots:'大型対応', hours:'平日のみ（土日祝休）9:00〜17:00',
    shower:'あり', sleep:'仮眠・宿泊あり',
    facs:['🚿シャワー','🛏️仮眠・宿泊','🍽️食事・軽食','🅿️大型駐車可'],
    src:'出典：全日本トラック協会公式リスト・NAVITIME', real:true,
    gmapq:'亀山トラックステーション 三重県亀山市小野町桜ロ586-4'
  },
];

let map, markers = {}, selId = null;

function renderList() {
  const el = document.getElementById('spot-list');
  el.innerHTML = '';
  SPOTS.forEach(s => {
    const d = document.createElement('div');
    d.className = 'sc' + (s.id === selId ? ' sel' : '');
    d.onclick = () => selectSpot(s.id);
    d.innerHTML = `
      <div class="sc-top">
        <div class="sc-ico" style="background:${s.color}18;font-size:18px">${s.icon}</div>
        <div class="sc-body">
          <div class="sc-name">${s.name}</div>
          <div class="sc-addr">${s.addr}</div>
        </div>
      </div>
      <div class="tags">
        <span class="tag t-ok">✅ 実データ</span>
        <span class="tag t-info">${s.cat}</span>
        ${s.facs.slice(0,2).map(f=>`<span class="tag t-info">${f}</span>`).join('')}
      </div>
      <div class="sc-foot">
        <span>${s.hours.split('（')[0].split('/')[0].trim()}</span>
        <span>詳細 ›</span>
      </div>`;
    el.appendChild(d);
  });
}

function selectSpot(id) {
  selId = id;
  const s = SPOTS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('r-empty').style.display = 'none';
  document.getElementById('r-detail').classList.add('on');
  document.getElementById('d-hero-bg').style.background = `linear-gradient(135deg,${s.color}cc,${s.color}55)`;
  document.getElementById('d-icon').textContent = s.icon;
  document.getElementById('d-badge').textContent = '✅ 実データ';
  document.getElementById('d-badge').className = 'd-badge t-ok';
  document.getElementById('d-cat').textContent = s.cat;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-addr').textContent = '📍 ' + s.addr;
  document.getElementById('d-tel').textContent = '📞 ' + s.tel;
  document.getElementById('d-slots').textContent = s.slots;
  document.getElementById('d-hours').textContent = s.hours;
  document.getElementById('d-shower').textContent = s.shower;
  document.getElementById('d-sleep').textContent = s.sleep;
  document.getElementById('d-facs').innerHTML = s.facs.map(f=>`<span class="fac">${f}</span>`).join('');
  document.getElementById('d-src').textContent = s.src;
  document.getElementById('d-gmap-btn').onclick = () =>
    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.gmapq)}`, '_blank');
  document.getElementById('ci-title').textContent = s.name + ' にチェックイン';
  document.getElementById('ci-shower-price').textContent = s.shower;
  document.getElementById('ci-sleep-price').textContent = s.sleep;
  renderList();
  if (map && markers[id]) map.panTo(markers[id].getPosition());
}

// ===== Google Maps =====
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: {lat:35.5, lng:137.0}, zoom:8,
    styles:[
      {featureType:'all',elementType:'geometry',stylers:[{color:'#EBF0F8'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#ffffff'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#C8D8EC'}]},
      {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#B0C4DE'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#B8D0E8'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#D4E8C8'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#C0CCE0'}]},
    ],
    disableDefaultUI:true, zoomControl:true, mapTypeControl:false,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_TOP}
  });

  SPOTS.forEach(s => {
    const marker = new google.maps.Marker({
      position:{lat:s.lat, lng:s.lng}, map,
      title:s.name,
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        scale:14,
        fillColor:s.color,
        fillOpacity:1,
        strokeColor:'#ffffff',
        strokeWeight:2.5,
      },
      label:{text:s.icon, fontSize:'13px'}
    });
    marker.addListener('click', () => selectSpot(s.id));
    markers[s.id] = marker;
  });
}

function locateMe() {
  if (!navigator.geolocation) { alert('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const loc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    if (map) {
      map.panTo(loc);
      map.setZoom(12);
      new google.maps.Marker({
        position:loc, map, title:'現在地',
        icon:{path:google.maps.SymbolPath.CIRCLE, scale:9, fillColor:'#1565C0', fillOpacity:1, strokeColor:'#fff', strokeWeight:3}
      });
    }
  }, () => alert('位置情報を取得できませんでした'));
}

// ===== CHECKIN =====
function showCI() {
  document.getElementById('ci-form').style.display = 'block';
  document.getElementById('ci-done').style.display = 'none';
  document.getElementById('ci-overlay').classList.add('on');
}
function closeCI(e) {
  if (!e || e.target === document.getElementById('ci-overlay'))
    document.getElementById('ci-overlay').classList.remove('on');
}
function selOpt(el) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('on'));
  el.classList.add('on');
}
function doCI() {
  document.getElementById('ci-form').style.display = 'none';
  document.getElementById('ci-done').style.display = 'block';
}

// ===== FALLBACK (APIキーなし) =====
window.addEventListener('load', () => {
  if (typeof google === 'undefined') {
    const m = document.getElementById('map');
    m.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:linear-gradient(135deg,#E8EDF5,#C8D8EC);padding:2rem';
    m.innerHTML = `
      <div style="font-size:40px">🗺️</div>
      <div style="font-size:13px;font-weight:700;color:#1A2332">Google Maps</div>
      <div style="font-size:11px;color:#6B7A8D;text-align:center;max-width:240px;line-height:1.6">
        APIキーを設定するとここに地図が表示されます<br>
        左のリストからスポットを選択できます
      </div>`;
  }
});

renderList();
</script>
